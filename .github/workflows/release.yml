name: Release & Update Homebrew

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if release needed
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          PREVIOUS=$(git show HEAD~1:build.zig.zon 2>/dev/null | grep -oP '\.version\s*=\s*"\K[^"]+' || echo "")
          echo "current=$CURRENT previous=$PREVIOUS"
          TAG="v$CURRENT"
          RELEASE_EXISTS=$(gh release view "$TAG" --json tagName 2>/dev/null && echo "true" || echo "false")
          if [ "$RELEASE_EXISTS" = "false" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update tag
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe

      - name: Package
        run: |
          ARCHIVE="ccdocker-${{ needs.check.outputs.tag }}-darwin-arm64"
          mkdir -p "$ARCHIVE"
          cp zig-out/bin/ccdocker zig-out/bin/pty-proxy "$ARCHIVE/"
          cp Dockerfile entrypoint.sh .dockerignore clipboard-shim.sh "$ARCHIVE/"
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: ccdocker-darwin-arm64
          path: "*.tar.gz"

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        run: gh release create "${{ needs.check.outputs.tag }}" --generate-notes *.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Compute SHA256
        id: sha
        run: |
          SHA_ARM64=$(shasum -a 256 ccdocker-${{ needs.check.outputs.tag }}-darwin-arm64.tar.gz | cut -d' ' -f1)
          echo "sha_arm64=$SHA_ARM64" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ needs.check.outputs.tag }}"
          VERSION="${VERSION#v}"
          URL="https://github.com/yossyl3oy/ccdocker/releases/download/${{ needs.check.outputs.tag }}/ccdocker-${{ needs.check.outputs.tag }}-darwin-arm64.tar.gz"

          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/yossyl3oy/homebrew-ccdocker.git tap
          cd tap

          cat > Formula/ccdocker.rb << 'EOF'
          class Ccdocker < Formula
            desc "Run Claude Code in Docker with profile management"
            homepage "https://github.com/yossyl3oy/ccdocker"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            depends_on arch: :arm64

            url "URL_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"

            def install
              libexec.install "ccdocker", "pty-proxy", "Dockerfile", "entrypoint.sh", ".dockerignore", "clipboard-shim.sh"
              bin.install_symlink libexec/"ccdocker"
            end

            test do
              assert_match "ccdocker", shell_output("#{bin}/ccdocker -v")
            end
          end
          EOF

          sed -i "s|VERSION_PLACEHOLDER|$VERSION|" Formula/ccdocker.rb
          sed -i "s|URL_PLACEHOLDER|$URL|" Formula/ccdocker.rb
          sed -i "s|SHA_PLACEHOLDER|${{ steps.sha.outputs.sha_arm64 }}|" Formula/ccdocker.rb
          sed -i 's/^          //' Formula/ccdocker.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccdocker.rb
          git commit -m "Update ccdocker to $VERSION"
          git push
